# ============================================================================
# Fashion Aesthetics ML — Configuration
# Optimized for Apple Silicon M3 Pro (18GB Unified Memory)
# ============================================================================

project:
  name: "fashion-aesthetics-ml"
  seed: 42

# ---------------------------------------------------------------------------
# Paths
# ---------------------------------------------------------------------------
paths:
  data_dir: "./data"
  checkpoints_dir: "./checkpoints"
  outputs_dir: "./outputs"

# ---------------------------------------------------------------------------
# Data — Fashion product images + LAION Aesthetic Predictor scoring
# ---------------------------------------------------------------------------
data:
  # 44K real fashion product images (embedded in HF, instant download)
  dataset_name: "ashraq/fashion-product-images-small"
  # Aesthetic scores generated by LAION Aesthetic Predictor v2 (CLIP ViT-L/14)
  max_train_samples: 12000                   # Use 12K for training + val
  max_val_samples: 2000
  image_size: 224                            # For CLIP predictor
  gen_image_size: 512                        # For SD generation
  val_split: 0.15
  num_workers: 0                             # 0 for MPS compatibility

# ---------------------------------------------------------------------------
# Aesthetic Predictor — CLIP ViT-B/32 + MLP Head
# ---------------------------------------------------------------------------
predictor:
  clip_model: "openai/clip-vit-base-patch32"
  freeze_backbone: true
  hidden_dims: [512, 256, 128]
  dropout: 0.3
  batch_size: 32
  epochs: 25
  lr: 3.0e-4
  weight_decay: 0.01
  scheduler: "cosine"
  warmup_epochs: 3

# ---------------------------------------------------------------------------
# Design Generator — Stable Diffusion 1.5 + LoRA
# ---------------------------------------------------------------------------
generator:
  model_id: "stable-diffusion-v1-5/stable-diffusion-v1-5"
  lora_rank: 4
  lora_alpha: 4
  lora_target_modules: ["to_q", "to_v", "to_k", "to_out.0"]
  batch_size: 1                              # Memory safe for M3 Pro
  gradient_accumulation_steps: 4
  max_train_steps: 2000
  learning_rate: 1.0e-4
  lr_scheduler: "cosine"
  lr_warmup_steps: 100
  save_steps: 500
  mixed_precision: "no"                      # MPS does not support fp16 training

# ---------------------------------------------------------------------------
# Inference / Generation
# ---------------------------------------------------------------------------
inference:
  num_samples: 4
  guidance_scale: 7.5
  num_inference_steps: 30
  target_aesthetic_score: 7.0               # Generate high-aesthetic designs
  negative_prompt: "low quality, blurry, watermark, text, logo, bad anatomy, ugly, deformed"

# ---------------------------------------------------------------------------
# Evaluation
# ---------------------------------------------------------------------------
evaluation:
  metrics: ["mae", "rmse", "r2", "pearson", "spearman"]
